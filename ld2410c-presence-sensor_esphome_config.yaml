#Studio Presence Automation Project
substitutions:
  name: studio-presence-sensor
  friendly_name: "Studio Presence Sensor"
  area: "Studio Room"
  version: "25.3.9"
  project_name: "NOTON COMICS.LD2410C-P Presence Sensor"
  device_description: ${name} for Presence Automation - v${version}.
  board: "nodemcu-32s"
  # Uncomment below line, if you're using ESP32 DevKit V1 board, then comment the previous line.
  #board: "esp32doit-devkit-v1"
  # Generate a 32-byte base64-encoded string or copy encryption key from [here](https://esphome.io/components/api.html#configuration-variables)
  api_encryption_key: "<REPLACE WITH API ENCRYPTION KEY HERE>"
  username: "<REPLACE WITH USERNAME>"
  password: "<REPLACE WITH PASSWORD>"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  comment: " LD2410C-P Presence Sensor by NOTON COMICS"
  area: "${area}"

  project:
    name: "${project_name}"
    version: "${version}"

  min_version: 2025.5.2

esp32:
  board: "${board}"
  framework:
    type: arduino

# Enable logging
logger:

# Enable debug
debug:
  update_interval: 900s

# Enable Home Assistant API
api:
  encryption:
    key: "${api_encryption_key}"
  # Action for changing Bluetooth password of LD2410C (Home Assistant > Developer Tools > Actions > choose set_bluetooth_password action)
  actions:
    - action: set_bluetooth_password
      variables:
        password: string
      then:
        - bluetooth_password.set:
            id: ld2410_sensor
            password: !lambda "return password;"

ota:
  platform: esphome
  password: "${password}"

wifi:
  power_save_mode: none

  networks:
    - ssid: "<SET SSID 1>"
      password: "SET SSID 1 PASSWORD"
    - ssid: "SET SSID 2"
      password: "SET SSID 2 PASSWORD"

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Studio Presence Sensor Hotspot"
    password: "<SET AP PASSWORD HERE>"

captive_portal:

#This is for LD2410 - Can be used with both ESP32 and ESP8266 Microcontrollers
# https://esphome.io/components/sensor/ld2410.html

web_server:
  version: 3
  port: 80
  local: true
  include_internal: true
  auth:
    username: "${username}"
    password: "${password}"
  sorting_groups:
    - id: sorting_group_occupancy
      name: "Presence/Occupancy Detection"
      sorting_weight: 10
    - id: sorting_group_energy_threshold
      name: "Zone Energy Threshold"
      sorting_weight: 40
    - id: sorting_group_distance
      name: "Presence Distance (cm)"
      sorting_weight: 20
    - id: sorting_group_energy
      name: "Presence Energy (%)"
      sorting_weight: 30
    - id: sorting_group_zone_configuration
      name: "Zone Configuration"
      sorting_weight: 90
    - id: sorting_group_sensor_diagnostic
      name: "Presence Sensor Diagnostic"
      sorting_weight: 99
    - id: sorting_group_esp_diagnostic
      name: "ESP Diagnostic"
      sorting_weight: 100

# ---------------------------------------------------------------------------------

uart:
  id: ld2410_uart
  tx_pin: GPIO14 # TX
  rx_pin: GPIO27 # RX
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  uart_id: ld2410_uart
  throttle: 1500ms
  id: ld2410_sensor

select:
  - platform: ld2410
    distance_resolution:
      name: Distance Resolution
      disabled_by_default: true
      internal: true
      web_server:
        sorting_group_id: sorting_group_sensor_diagnostic
    baud_rate:
      name: Baud Rate
      internal: true
      web_server:
        sorting_group_id: sorting_group_sensor_diagnostic
    light_function:
      name: Light Function
      internal: true
      web_server:
        sorting_group_id: sorting_group_sensor_diagnostic
    out_pin_level:
      name: Out Pin Level
      internal: true
      web_server:
        sorting_group_id: sorting_group_sensor_diagnostic

button:
  - platform: restart
    web_server:
      sorting_group_id: sorting_group_esp_diagnostic
    icon: mdi:restart
    name: "Reboot"
    internal: true

  - platform: factory_reset
    web_server:
      sorting_group_id: sorting_group_esp_diagnostic
    disabled_by_default: true
    name: "Factory Reset"
    id: factory_reset_all
    internal: true

  - platform: ld2410
    factory_reset:
      name: "Reset"
      internal: true
      web_server:
        sorting_group_id: sorting_group_sensor_diagnostic
    restart:
      name: "Restart"
      internal: true
      web_server:
        sorting_group_id: sorting_group_sensor_diagnostic
    query_params:
      name: "Query Params"
      internal: true
      web_server:
        sorting_group_id: sorting_group_sensor_diagnostic

number:
  - platform: ld2410
    timeout:
      name: Timeout
      mode: box
      web_server:
        sorting_group_id: sorting_group_sensor_diagnostic
    max_move_distance_gate:
      name: Max Move Distance Gate
      web_server:
        sorting_group_id: sorting_group_zone_configuration
    max_still_distance_gate:
      name: Max Still Distance Gate
      icon: mdi:leak
      web_server:
        sorting_group_id: sorting_group_zone_configuration
    g0:
      move_threshold:
        name: G0 Move Threshold
        web_server:
          sorting_group_id: sorting_group_energy_threshold
      still_threshold:
        name: G0 Still Threshold
        icon: mdi:leak
        web_server:
          sorting_group_id: sorting_group_energy_threshold
    g1:
      move_threshold:
        name: G1 Move Threshold
        web_server:
          sorting_group_id: sorting_group_energy_threshold
      still_threshold:
        name: G1 Still Threshold
        icon: mdi:leak
        web_server:
          sorting_group_id: sorting_group_energy_threshold
    g2:
      move_threshold:
        name: G2 Move Threshold
        web_server:
          sorting_group_id: sorting_group_energy_threshold
      still_threshold:
        name: G2 Still Threshold
        icon: mdi:leak
        web_server:
          sorting_group_id: sorting_group_energy_threshold
    g3:
      move_threshold:
        name: G3 Move Threshold
        web_server:
          sorting_group_id: sorting_group_energy_threshold
      still_threshold:
        name: G3 Still Threshold
        icon: mdi:leak
        web_server:
          sorting_group_id: sorting_group_energy_threshold
    g4:
      move_threshold:
        name: G4 Move Threshold
        web_server:
          sorting_group_id: sorting_group_energy_threshold
      still_threshold:
        name: G4 Still Threshold
        icon: mdi:leak
        web_server:
          sorting_group_id: sorting_group_energy_threshold
    g5:
      move_threshold:
        name: G5 Move Threshold
        web_server:
          sorting_group_id: sorting_group_energy_threshold
      still_threshold:
        name: G5 Still Threshold
        icon: mdi:leak
        web_server:
          sorting_group_id: sorting_group_energy_threshold
    g6:
      move_threshold:
        name: G6 Move Threshold
        web_server:
          sorting_group_id: sorting_group_energy_threshold
      still_threshold:
        name: G6 Still Threshold
        icon: mdi:leak
        web_server:
          sorting_group_id: sorting_group_energy_threshold
    g7:
      move_threshold:
        name: G7 Move Threshold
        web_server:
          sorting_group_id: sorting_group_energy_threshold
      still_threshold:
        name: G7 Still Threshold
        icon: mdi:leak
        web_server:
          sorting_group_id: sorting_group_energy_threshold
    g8:
      move_threshold:
        name: G8 Move Threshold
        web_server:
          sorting_group_id: sorting_group_energy_threshold
      still_threshold:
        name: G8 Still Threshold
        icon: mdi:leak
        web_server:
          sorting_group_id: sorting_group_energy_threshold
    light_threshold:
      name: Light Threshold
      web_server:
        sorting_group_id: sorting_group_energy_threshold

  # Setting start of zone 1 occupancy
  - platform: template
    web_server:
      sorting_group_id: sorting_group_zone_configuration
      sorting_weight: 10
    name: "Start Zone 1"
    id: ld2410_z1_start
    device_class: distance
    min_value: 0
    max_value: 800
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 0
    icon: "mdi:arrow-collapse-right"
    entity_category: CONFIG
    unit_of_measurement: "cm"

  # Setting ending of zone 1 occupancy
  - platform: template
    web_server:
      sorting_group_id: sorting_group_zone_configuration
      sorting_weight: 20
    name: "End Zone 1"
    id: ld2410_z1_end
    device_class: distance
    min_value: 0
    max_value: 600
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 50
    icon: "mdi:arrow-collapse-right"
    entity_category: CONFIG
    unit_of_measurement: "cm"

  # Setting ending of zone 2 occupancy
  - platform: template
    web_server:
      sorting_group_id: sorting_group_zone_configuration
      sorting_weight: 30
    name: "End Zone 2"
    id: ld2410_z2_end
    device_class: distance
    min_value: 0
    max_value: 600
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 150
    icon: "mdi:arrow-collapse-right"
    entity_category: CONFIG
    unit_of_measurement: "cm"

  # Setting ending of zone 3 occupancy
  - platform: template
    web_server:
      sorting_group_id: sorting_group_zone_configuration
      sorting_weight: 40
    name: "End Zone 3"
    id: ld2410_z3_end
    device_class: distance
    min_value: 0
    max_value: 600
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 250
    icon: "mdi:arrow-collapse-right"
    entity_category: CONFIG
    unit_of_measurement: "cm"

