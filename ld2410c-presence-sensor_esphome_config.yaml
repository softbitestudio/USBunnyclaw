binary_sensor:
  - platform: ld2410
    has_target:
      name: Presence
      id: presence
      icon: mdi:home-sound-in
      device_class: presence
      web_server:
        sorting_group_id: sorting_group_occupancy
        sorting_weight: 10
    has_moving_target:
      name: Moving Target
      id: moving_target
      icon: mdi:motion-sensor
      device_class: motion
      web_server:
        sorting_group_id: sorting_group_occupancy
        sorting_weight: 20
    has_still_target:
      name: Still Target
      id: still_target
      icon: mdi:leak
      device_class: occupancy
      web_server:
        sorting_group_id: sorting_group_occupancy
        sorting_weight: 30
    out_pin_presence_status:
      name: Out Pin Presence Status (Engineering Mode)
      icon: mdi:square-wave
      internal: true
      web_server:
        sorting_group_id: sorting_group_sensor_diagnostic

  - platform: gpio
    pin: GPIO12
    name: Light Presence
    icon: mdi:wall-sconce-flat
    internal: true
    web_server:
      sorting_group_id: sorting_group_occupancy
      sorting_weight: 70

  ## Set Up Zones Based On Distance
  - platform: template
    name: "Zone 1 Occupancy"
    id: zone_1_occupancy
    device_class: occupancy
    icon: mdi:motion-sensor
    web_server:
      sorting_group_id: sorting_group_occupancy
      sorting_weight: 40
    lambda: |-
      if ((id(presence).state) && ((id(detection_distance).state <= id(ld2410_z1_end).state) && (id(detection_distance).state >= id(ld2410_z1_start).state))){
        return true;
      } else {
        return false;
      }
  - platform: template
    name: "Zone 2 Occupancy"
    id: zone_2_occupancy
    device_class: occupancy
    icon: mdi:motion-sensor
    web_server:
      sorting_group_id: sorting_group_occupancy
      sorting_weight: 50
    lambda: |-
      if ((id(presence).state) && ((id(ld2410_z1_end).state <= id(detection_distance).state) && (id(detection_distance).state <= id(ld2410_z2_end).state))) {
        return true;
      } else {
        return false;
      }
  - platform: template
    name: "Zone 3 Occupancy"
    id: zone_3_occupancy
    device_class: occupancy
    icon: mdi:motion-sensor
    web_server:
      sorting_group_id: sorting_group_occupancy
      sorting_weight: 60
    lambda: |-
      if ((id(presence).state) && ((id(ld2410_z2_end).state <= id(detection_distance).state) && (id(detection_distance).state <= id(ld2410_z3_end).state))) {
        return true;
      } else {
        return false;
      }